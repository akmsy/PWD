<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan JQuery</title>
</head>
<body>
    <h1 class="makanan">Gudeg</h1>
    <h1 class="makanan">Pecel</h1>
    <h1 class="makanan">Sate Klatak</h1>
    <h1 class="makanan">Lotek</h1>
    <button onclick="ambilDataMakanan()">Ambil Data Makanan</button>

    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

    <script>
        function ambilDataMakanan() {
            let data = $(".makanan")
            data.each(function(number, element) {
                console.log(number)
                console.log($(element).text())
            }) // mengambil semua elemen dengan class "makanan"
        }
    </script>
</body>
</html>
